<div class="sidebar" [class.active]="isActive" [class.removeActive]="removeActive" *transloco="let t">
   <div class="content">
    <div class="icon-con x" (click)="closeMenu()">
      <!-- <i class="fa-solid fa-x"></i> -->
       <span class="one"></span>
       <span class="two"></span>
       <span class="three"></span>
    </div>
    <nav>  
      <ul>
        <div class="licon" style="--i:3; --x:8;"  routerLink="/home" (click)="closeMenul()">
          <li>{{t ('n1')}}</li>
        </div>
        <div class="licon" style="--i:4;--x:7;"  routerLink="/stadium" (click)="closeMenul()">
        <li>{{t ('n2')}}</li>
        </div>
        <div class="licon" style="--i:5;--x:6;"  routerLink="/story" (click)="closeMenul()">
        <li>{{t ('n3')}}</li>
        </div>
        <div class="licon" style="--i:6;--x:5;"  routerLink="/faq" (click)="closeMenul()">
        <li>{{t ('n4')}}</li>
        </div>
        <div class="licon" style="--i:7;--x:4;"  routerLink="/about" (click)="closeMenul()">
        <li>{{t ('n5')}}</li>
        </div>
        <div class="licon" style="--i:8;--x:3;"  routerLink="/contact" (click)="closeMenul()">
        <li>{{t ('n6')}}</li>
        </div>
      </ul>
    </nav>
    <div class="social">
      <div class="icon-con" style="--z:5;--r:3">
          <i class="fa-brands fa-facebook-f"></i>
      </div>
      <div class="icon-con" style="--z:4;--r:4">
          <i class="fa-brands fa-twitter"></i>  
      </div>
      <div class="icon-con" style="--z:3;--r:5">
        <i class="fa-brands fa-instagram"></i>
      </div>
    </div>
   </div>
</div>
<router-outlet />
